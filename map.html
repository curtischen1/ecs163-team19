<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #b8d4e8;
}

svg {
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>

<body>

<svg id="map-svg"></svg>

<div id="tooltip" style="
  position: fixed;
  display: none;
  background: rgba(35, 57, 98, 0.93);
  color: #fff;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-family: Arial, sans-serif;
  pointer-events: none;
  z-index: 100;
  max-width: 210px;
  line-height: 1.5;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<script>
//const DateFrom = '2024-03-01';
//const DateTo = '2024-04-01';


let APP_TOKEN = localStorage.getItem("SF_APP_TOKEN");

if (!APP_TOKEN) {
  APP_TOKEN = prompt("Paste the SF Open Data app token:");
  localStorage.setItem("SF_APP_TOKEN", APP_TOKEN);
}

const W = innerWidth;
const H = innerHeight;

const svg = d3.select("#map-svg")
  .attr("width", W)
  .attr("height", H);

const projection = d3.geoMercator();
const pathGen = d3.geoPath(projection);

const SF_URL =
  `https://data.sfgov.org/api/v3/views/gfpk-269f/query.geojson?$$app_token=${encodeURIComponent(APP_TOKEN)}`;

//const TRACTS_URL = 'sf_tracts.json';
const params = new URLSearchParams(window.location.search);
const TRACTS_URL = params.get("boundary") === "tract" ? "sf_tracts.json" : "zip.json";

// moved from lines 36-37 to use params object
const monthParam = params.get("month") || "mar";
const monthIndex = { jan:1, feb:2, mar:3, apr:4, may:5, jun:6, jul:7, aug:8, sep:9, oct:10, nov:11, dec:12 };
const m = monthIndex[monthParam] || 3;
const DateFrom = `2024-${String(m).padStart(2, "0")}-01`;
const DateTo = m === 12 ? "2025-01-01" : `2024-${String(m + 1).padStart(2, "0")}-01`;

const EMS_URL =
  `https://data.sfgov.org/resource/nuek-vuh3.json?$where=received_dttm >= '${DateFrom}T00:00:00' AND received_dttm < '${DateTo}T00:00:00'&$limit=50000&$$app_token=${encodeURIComponent(APP_TOKEN)}`;

const SAMPLE_SIZE = 750;

function sampleIncidents(arr, n) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a.slice(0, Math.min(n, a.length));
}

function buildGrid(points, cell = 8) {
  const cols = Math.ceil(W / cell);
  const rows = Math.ceil(H / cell);

  const grid = new Float32Array(cols * rows);

  const sigma = 25;
  const denom = 2 * sigma * sigma;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * cell + cell / 2;
      const y = r * cell + cell / 2;

      let sum = 0;
      let total = 0;

      for (const p of points) {
        const dx = x - p.x;
        const dy = y - p.y;

        const w = Math.exp(-(dx * dx + dy * dy) / denom);

        sum += w * p.t;
        total += w;
      }

      grid[r * cols + c] = total ? sum / total : 0;
    }
  }

  return { grid, cols, rows };
}

const container = svg.append("g");

const zoom = d3.zoom()
  .scaleExtent([0.5,8])
  .on("zoom", (event) => {
    container.attr("transform", event.transform);
    if (dotsLayer) {
      const k = event.transform.k;
      dotsLayer.selectAll("circle")
        .attr("r", 3 / k)
        .attr("stroke-width", 0.5 / k);
    }
    if (stationsLayer) {
      const k = event.transform.k;
      stationsLayer.selectAll("circle")
        .attr("r", 6 / k)
        .attr("stroke-width", 1.5 / k);
    }
  });

svg.call(zoom);
svg.on("mouseenter", function() { window.focus();});
document.addEventListener("wheel", function(e) {e.preventDefault();}, { passive: false });

let stationsLayer = null;
let dotsLayer = null;

/*window.addEventListener("message", (event) => {
  if (event.data.type === "SET_FIRESTATIONS" && stationsLayer) {
    stationsLayer.attr("display", event.data.visible ? null : "none");
  }
});*/
window.addEventListener("message", function (event) {
    if (event.data.type === "SET_FIRESTATIONS" && stationsLayer) {
        stationsLayer.attr("display", event.data.visible ? null : "none");
    }
    if (event.data.type === "ZOOM_IN") {
        zoom.scaleBy(svg.transition().duration(300), 1.5);
    }
    if (event.data.type === "ZOOM_OUT") {
        zoom.scaleBy(svg.transition().duration(300), 1 / 1.5);
    }
});

async function init() {
  try {
    const [geo, tracts, ems, stations, sfUnion] = await Promise.all([
      fetch(SF_URL).then(r => {
        if (!r.ok) throw new Error("SF map data failed to load");
        return r.json();
      }),

      fetch(TRACTS_URL).then(r => {
        if (!r.ok) throw new Error("Zip boundary file failed to load");
        return r.json();
      }),

      fetch(EMS_URL).then(r => {
        if (!r.ok) throw new Error("EMS data failed to load");
        return r.json();
      }),

      fetch("firestations.json").then(r => {
        if (!r.ok) throw new Error("Fire stations file failed to load");
        return r.json();
      }),

      fetch(params.get("boundary") === "tract" ? "sf_tracts_border.json" : "zip_borders.json").then(r => {
        if (!r.ok) throw new Error("SF border file failed to load");
        return r.json();
      })
    ]);

    projection.fitExtent([[20, 20], [W - 20, H - 20]], geo);

    const centroids = geo.features.map(f => {
      const [x, y] = pathGen.centroid(f);

      return {
        x,
        y,
        tSum: 0,
        count: 0
      };
    }).filter(d => isFinite(d.x));

    const rows = ems
      .filter(d =>
        d.received_dttm &&
        d.on_scene_dttm &&
        d.case_location?.coordinates
      )
      .map(d => {
        const [lng, lat] = d.case_location.coordinates;

        return {
          lng,
          lat,
          t: (new Date(d.on_scene_dttm) - new Date(d.received_dttm)) / 1000,
          receivedDttm: d.received_dttm,
          callTypeGroup: d.call_type_group || "Unknown",
          stationArea: d.station_area || "—",
          address: d.address || "—",
          zipcode: d.zipcode_of_incident || "—"
        };
      })
      .filter(d => d.t > 0 && d.t < 3600);

    for (const d of rows) {
      const [px, py] = projection([d.lng, d.lat]);

      let best;
      let bestDist = Infinity;

      for (const c of centroids) {
        const dx = px - c.x;
        const dy = py - c.y;

        const dist = dx * dx + dy * dy;

        if (dist < bestDist) {
          bestDist = dist;
          best = c;
        }
      }

      if (best) {
        best.tSum += d.t;
        best.count++;
      }
    }

    const points = centroids
      .filter(d => d.count)
      .map(d => ({
        x: d.x,
        y: d.y,
        t: d.tSum / d.count
      }));

    const sampledRows = sampleIncidents(rows, SAMPLE_SIZE);

    if (points.length === 0) {
      throw new Error("No EMS points were found for this date range.");
    }

    const { grid, cols, rows: gridRows } = buildGrid(points);

    const min = d3.min(points, d => d.t);
    const max = d3.max(points, d => d.t);

    const color = d3.scaleSequential()
      .domain([min, max])
      .interpolator(t => d3.interpolateRgbBasis([
        "#f3e8ff",
        "#c084fc",
        "#7e22ce",
        "#4c1d95",
        "#2e1065"
      ])(t));

    const contours = d3.contours()
      .size([cols, gridRows])
      .thresholds(20)(
        grid
      );

    const contourPath =
      d3.geoPath(
        d3.geoIdentity().scale(8)
      );

    // Clip contours to SF boundary using unioned shape
    const defs = svg.append("defs");
    const clipPath = defs.append("clipPath").attr("id", "sf-clip");
    const sfUnionPath = pathGen(sfUnion);
    if (sfUnionPath) clipPath.append("path").attr("d", sfUnionPath);

    container.append("g")
      .attr("clip-path", "url(#sf-clip)")
      .selectAll("path")
      .data(contours)
      .enter()
      .append("path")
      .attr("d", contourPath)
      .attr("fill", d => color(d.value))
      .attr("stroke", d => color(d.value))
      .attr("stroke-width", 1.3)
      .attr("opacity", 1);

    // Mask everything outside SF with background color
    const bigRect = `M0,0L0,${H}L${W},${H}L${W},0Z`;
    container.append("path")
      .attr("d", bigRect + " " + sfUnionPath)
      .attr("fill", "#b8d4e8")
      .attr("fill-rule", "evenodd")
      .attr("stroke", "none");

    container.append("g") // changed from svg to container to fix zooming
      .selectAll("path")
      .data(tracts.features)
      .enter()
      .append("path")
      .attr("d", pathGen)
      .attr("fill", "none")
      .attr("stroke", "#14071f")
      .attr("stroke-width", 0.8);

    dotsLayer = container.append("g").attr("id", "dots-layer");

    const tooltip = d3.select("#tooltip");

    dotsLayer.selectAll("circle")
      .data(sampledRows)
      .enter()
      .append("circle")
      .attr("cx", d => projection([d.lng, d.lat])[0])
      .attr("cy", d => projection([d.lng, d.lat])[1])
      .attr("r", 3)
      .attr("fill", "#ffffff")
      .attr("fill-opacity", 0.75)
      .attr("stroke", "#233962")
      .attr("stroke-width", 0.5)
      .style("cursor", "pointer")
      .on("mouseover", function (event, d) {
        const date = new Date(d.receivedDttm);
        const dateStr = date.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
        const timeStr = date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
        const mins = Math.floor(d.t / 60);
        const secs = Math.round(d.t % 60);
        tooltip
          .style("display", "block")
          .style("left", (event.clientX + 14) + "px")
          .style("top", (event.clientY - 10) + "px")
          .html(
            `<strong>${dateStr} ${timeStr}</strong><br>` +
            `Response: ${mins}m ${secs}s<br>` +
            `Type: ${d.callTypeGroup}<br>` +
            `Station: ${d.stationArea}<br>` +
            `${d.address}, ${d.zipcode}`
          );
      })
      .on("mousemove", function (event) {
        tooltip
          .style("left", (event.clientX + 14) + "px")
          .style("top", (event.clientY - 10) + "px");
      })
      .on("mouseout", function () {
        tooltip.style("display", "none");
      })
      .on("click", function (event, d) {
        const date = new Date(d.receivedDttm);
        const dateStr = date.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
        const timeStr = date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
        const mins = Math.floor(d.t / 60);
        const secs = Math.round(d.t % 60);
        window.parent.postMessage({
          type: "INCIDENT_CLICK",
          data: {
            date: `${dateStr} at ${timeStr}`,
            responseTime: `${mins} min ${secs} sec`,
            callTypeGroup: d.callTypeGroup,
            stationArea: d.stationArea,
            address: d.address,
            zipcode: d.zipcode
          }
        }, "*");
      });

    stationsLayer = container.append("g").attr("display", "none"); // changed from svg to container to fix zooming

    stationsLayer.selectAll("circle")
      .data(stations)
      .enter()
      .append("circle")
      .attr("cx", d => projection([d.lng, d.lat])[0])
      .attr("cy", d => projection([d.lng, d.lat])[1])
      .attr("r", 6)
      .attr("fill", "#ff6b00")
      .attr("stroke", "#ffffff")
      .attr("stroke-width", 1.5)
      //.append("title")
      //.text(d => `Station ${parseInt(d.station_number)}`);
      .on("mouseover", function (event, d) {
        tooltip
          .style("display", "block")
          .style("left", (event.clientX + 14) + "px")
          .style("top", (event.clientY - 10) + "px")
          .html(`<strong>Station ${parseInt(d.station_number)}</strong>`);
      })
      .on("mousemove", function (event) {
        tooltip
          .style("left", (event.clientX + 14) + "px")
          .style("top", (event.clientY - 10) + "px");
      })
      .on("mouseout", function () {
        tooltip.style("display", "none");
      })

    window.parent.postMessage({ type: "MAP_READY" }, "*");

  } catch (error) {
    console.error(error);

    svg.append("text")
      .attr("x", W / 2)
      .attr("y", H / 2)
      .attr("text-anchor", "middle")
      .attr("fill", "#233962")
      .attr("font-size", "20px")
      .attr("font-family", "Arial, sans-serif")
      .text("Map data could not load. Check token, Live Server, and file names.");
  }
}

addEventListener("resize", () => location.reload());

init();
</script>

</body>
</html>
