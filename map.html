<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #b8d4e8;
}

svg {
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>

<body>

<svg id="map-svg"></svg>

<div id="tooltip" style="
  position: fixed;
  display: none;
  background: rgba(35, 57, 98, 0.93);
  color: #fff;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-family: Arial, sans-serif;
  pointer-events: none;
  z-index: 100;
  max-width: 210px;
  line-height: 1.5;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<script>

// Heatmap contours still use the local monthly summary file, but the clickable
// incident dots now come from the real SF Open Data EMS rows for the selected
// month. That matches the older branch behavior: dots are actual incidents,
// shuffled across the whole month, and the slider controls how many are visible.

// Map dimensions and d3 primitives
const W = innerWidth;
const H = innerHeight;
const svg = d3.select("#map-svg")
  .attr("width", W)
  .attr("height", H);
const projection = d3.geoMercator();
const pathGen = d3.geoPath(projection);

// Data source URL parameters
// boundary param switches between zip code and census tract overlays
// month param sets which month's EMS data to load on initial render
const params = new URLSearchParams(window.location.search);
const TRACTS_URL = params.get("boundary") === "tract" ? "sf_tracts.json" : "zip.json";
let currentSampleSize = 750;
const monthParam = params.get("month") || "mar";

const MONTH_INDEX = {
    jan: 1, feb: 2, mar: 3, apr: 4, may: 5, jun: 6,
    jul: 7, aug: 8, sep: 9, oct: 10, nov: 11, dec: 12
};

function monthSeed(monthKey) {
    return Array.from(monthKey).reduce((sum, ch) => sum + ch.charCodeAt(0), 2024);
}

function mulberry32(seed) {
    return function () {
        seed |= 0;
        seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

function seededShuffle(arr, seed) {
    const rng = mulberry32(seed);
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function monthDateRange(monthKey) {
    const m = MONTH_INDEX[monthKey] || 3;
    const from = `2024-${String(m).padStart(2, "0")}-01`;
    const to = m === 12 ? "2025-01-01" : `2024-${String(m + 1).padStart(2, "0")}-01`;
    return { from, to };
}

let APP_TOKEN = localStorage.getItem("SF_APP_TOKEN") || "";

function buildEMSUrl(monthKey) {
    const { from, to } = monthDateRange(monthKey);
    const params = new URLSearchParams();
    params.set("$select", "received_dttm,on_scene_dttm,case_location,call_type_group,station_area,address,zipcode_of_incident");
    params.set("$where", `received_dttm >= '${from}T00:00:00' AND received_dttm < '${to}T00:00:00' AND on_scene_dttm IS NOT NULL AND case_location IS NOT NULL`);
    params.set("$limit", "50000");
    if (APP_TOKEN) params.set("$$app_token", APP_TOKEN);
    return `https://data.sfgov.org/resource/nuek-vuh3.json?${params.toString()}`;
}

async function fetchEMSRows(monthKey, retryWithToken = true) {
    let response = await fetch(buildEMSUrl(monthKey));

    if (!response.ok && retryWithToken && !APP_TOKEN) {
        APP_TOKEN = prompt("Paste the SF Open Data app token:") || "";
        if (APP_TOKEN) localStorage.setItem("SF_APP_TOKEN", APP_TOKEN);
        response = await fetch(buildEMSUrl(monthKey));
    }

    if (!response.ok) {
        throw new Error("EMS incident data failed to load");
    }

    const rawRows = await response.json();
    let idCounter = 0;

    return rawRows
        .filter(d => d.received_dttm && d.on_scene_dttm && d.case_location?.coordinates)
        .map(d => {
            const [lng, lat] = d.case_location.coordinates;
            return {
                incidentId: `${monthKey}-${idCounter++}`,
                lng,
                lat,
                t: (new Date(d.on_scene_dttm) - new Date(d.received_dttm)) / 1000,
                receivedDttm: d.received_dttm,
                callTypeGroup: d.call_type_group || "Unknown",
                stationArea: d.station_area || "—",
                address: d.address || "—",
                zipcode: d.zipcode_of_incident || "—"
            };
        })
        .filter(d => d.t > 0 && d.t < 3600 && isFinite(d.lng) && isFinite(d.lat));
}

// Gaussian KDE grid
// Assigns a weighted-average response time to each cell of a pixel grid using
// a Gaussian kernel (sigma = 25px), output is passed to d3.contours() to
// generate the heatmap filled contour paths
function buildGrid(points, cell = 8) {
  const cols = Math.ceil(W / cell);
  const rows = Math.ceil(H / cell);

  const grid = new Float32Array(cols * rows);

  const sigma = Math.min(W, H) / 20;
  const denom = 2 * sigma * sigma;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * cell + cell / 2;
      const y = r * cell + cell / 2;

      let sum = 0;
      let total = 0;

      for (const p of points) {
        const dx = x - p.x;
        const dy = y - p.y;

        const w = Math.exp(-(dx * dx + dy * dy) / denom);

        sum += w * p.t;
        total += w;
      }

      grid[r * cols + c] = total ? sum / total : 0;
    }
  }

  return { grid, cols, rows };
}

// Zoom and pan
// Incident dots and fire station markers scale inversely with zoom so they stay
// visually consistent, mouseenter focuses the iframe so trackpad scroll zooms
// instead of scrolling the parent page
const container = svg.append("g");
const zoom = d3.zoom()
  .scaleExtent([0.5,8])
  .on("zoom", (event) => {
    container.attr("transform", event.transform);
    currentK = event.transform.k;
    if (dotsLayer) {
      const k = event.transform.k;
      updateIncidentDotStyles();
    }
    if (stationsLayer) {
      const k = event.transform.k;
      stationsLayer.selectAll("circle")
        .attr("r", 6 / k)
        .attr("stroke-width", 1.5 / k);
    }
    if (regionPaths) {
      applyRegionHighlight();
    }
  });

svg.call(zoom);
svg.on("mouseenter", function() { window.focus();});
document.addEventListener("wheel", function(e) {e.preventDefault();}, { passive: false });

// Layer handles and shared state
// Declared at module scope so the zoom handler and postMessage listener
// can reference them before init() runs
let stationsLayer = null;
let dotsLayer = null;
let heatmapLayer = null;
let boundariesLayer = null;
let regionPaths = null;
let regionIdFn = null;
let highlightedRegionId = null;
let currentK = 1;
let selectedIncidentId = null;
let allStations = [];
const emsCache = new Map();
let heatmapDataCache = null;
let currentMonthRows = [];
let currentMonthKey = monthParam;

function distanceKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function nearestStationNumber(lat, lng) {
    if (!allStations.length) return "—";
    let nearest = allStations[0];
    let nearestDist = Infinity;
    for (const station of allStations) {
        const d = distanceKm(lat, lng, station.lat, station.lng);
        if (d < nearestDist) {
            nearestDist = d;
            nearest = station;
        }
    }
    return nearest.station_number;
}

function applyRegionHighlight() {
    if (!regionPaths || !regionIdFn) return;

    regionPaths
        .attr("stroke", d => regionIdFn(d) === highlightedRegionId ? "#ff8a00" : "#14071f")
        .attr("stroke-width", d => regionIdFn(d) === highlightedRegionId ? 2.5 / currentK : 0.8 / currentK)
        .filter(d => regionIdFn(d) === highlightedRegionId)
        .raise();
}

// Receives commands from script.js in the parent frame:
// SET_FIRESTATIONS show/hide fire station markers
// SET_MONTH re-render heatmap and dots for a new month (no reload)
// SET_SAMPLE_SIZE redraws the visible incident dots without changing the heatmap
// ZOOM_IN/OUT triggered by the +/− buttons in the parent UI
window.addEventListener("message", function (event) {
    if (event.data.type === "SET_FIRESTATIONS" && stationsLayer) {
        stationsLayer.attr("display", event.data.visible ? null : "none");
    }
    if (event.data.type === "SET_MONTH") {
        currentMonthKey = event.data.month || currentMonthKey;
        renderMonth(currentMonthKey).catch(console.error);
    }
    if (event.data.type === "SET_SAMPLE_SIZE") {
        currentSampleSize = Math.max(0, Math.min(10000, parseInt(event.data.size, 10) || 0));
        renderDots();
    }
    if (event.data.type === "SET_BOUNDARIES" && boundariesLayer) {
        boundariesLayer.attr("display", event.data.visible ? null : "none");
    }
    if (event.data.type === "SET_REGION_HIGHLIGHT") {
        highlightedRegionId = event.data.id == null ? null : String(event.data.id);
        applyRegionHighlight();
    }
    if (event.data.type === "ZOOM_IN") {
        zoom.scaleBy(svg.transition().duration(300), 1.5);
    }
    if (event.data.type === "ZOOM_OUT") {
        zoom.scaleBy(svg.transition().duration(300), 1 / 1.5);
    }
});

// draw the incident dots for the currently selected month
function renderDots() {
    if (!dotsLayer || !currentMonthRows) return;

    // clear selected incident whenever the dots are redrawn
    selectedIncidentId = null;
    const tooltip = d3.select("#tooltip");
    // show the num of incidents by slider
    const visibleRows = currentMonthRows.slice(0, Math.min(currentSampleSize, currentMonthRows.length));

    // remove old dots
    dotsLayer.selectAll("*").remove();
    dotsLayer.selectAll("circle")
        .data(visibleRows, d => d.incidentId)
        .enter()
        .append("circle")

        // position dot w/ longitude/latitude
        .attr("cx", d => projection([d.lng, d.lat])[0])
        .attr("cy", d => projection([d.lng, d.lat])[1])

        // divide by currentK so dots stay visually consistent while zooming
        .attr("r", 3 / currentK)
        .attr("fill", "#ffffff")
        .attr("fill-opacity", 0.75)
        .attr("stroke", "#233962")
        .attr("stroke-width", 0.5 / currentK)
        .style("cursor", "pointer")

        // make the dot larger on hover
        .on("mouseover", function (event, d) {
            if (d.incidentId !== selectedIncidentId) {
                d3.select(this)
                    .attr("r", 5 / currentK)
                    .attr("stroke", "#8a0fcb");
            }

            // format the incident date, time, and response time
            const date = new Date(d.receivedDttm);
            const dateStr = date.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
            const timeStr = date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
            const mins = Math.floor(d.t / 60);
            const secs = Math.round(d.t % 60);
            tooltip.style("display", "block")
                .style("left", (event.clientX + 14) + "px")
                .style("top", (event.clientY - 10) + "px")
                .html(`<strong>${dateStr} ${timeStr}</strong><br>Response: ${mins}m ${secs}s<br>Type: ${d.callTypeGroup}<br>Station: ${d.stationArea}<br>${d.address}, ${d.zipcode}`);
        })

        // keep tooltip nxt to the mouse while moving
        .on("mousemove", function (event) {
            tooltip.style("left", (event.clientX + 14) + "px")
                   .style("top", (event.clientY - 10) + "px");
        })
        // ret dot to normal when the mouse leaves unless selected
        .on("mouseout", function (event, d) {
            if (d.incidentId !== selectedIncidentId) {
                d3.select(this)
                    .attr("r", 3 / currentK)
                    .attr("stroke", "#233962");
            }
            tooltip.style("display", "none");
        })

        // select incident dot and send its details to the parent page
        .on("click", function (event, d) {
            selectedIncidentId = d.incidentId;
            updateIncidentDotStyles();

            const date = new Date(d.receivedDttm);
            const dateStr = date.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
            const timeStr = date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
            const mins = Math.floor(d.t / 60);
            const secs = Math.round(d.t % 60);
            window.parent.postMessage({
                type: "INCIDENT_CLICK",
                data: {
                    date: `${dateStr} at ${timeStr}`,
                    responseTime: `${mins} min ${secs} sec`,
                    callTypeGroup: d.callTypeGroup,
                    stationArea: d.stationArea,
                    address: d.address,
                    zipcode: d.zipcode
                }
            }, "*");

            // reset fire stations to default
            stationsLayer.selectAll("circle")
                .attr("fill", "#ff6b00")
                .attr("stroke", "#ffffff")
                .attr("stroke-width", 1.5 / currentK);

            // highlight responding fire station
            stationsLayer.selectAll("circle")
                .filter(s => parseInt(s.station_number) === parseInt(d.stationArea))
                .attr("fill", "#00b7ff")
                .attr("stroke", "#ff6b00")
                .attr("stroke-width", 3 / currentK);
        });
}

// update incident dots when selected
function updateIncidentDotStyles() {
    if (!dotsLayer) return;

    dotsLayer.selectAll("circle")
        // selected dot = larger and yellow
        .attr("r", d => d.incidentId === selectedIncidentId ? 6 / currentK : 3 / currentK)
        .attr("fill", d => d.incidentId === selectedIncidentId ? "#facc15" : "#ffffff")
        .attr("fill-opacity", d => d.incidentId === selectedIncidentId ? 1 : 0.75)
        .attr("stroke", d => d.incidentId === selectedIncidentId ? "#233962" : "#233962")
        .attr("stroke-width", d => d.incidentId === selectedIncidentId ? 1.4 / currentK : 0.5 / currentK);

    // move the selected dot to the front so can see
    dotsLayer.selectAll("circle")
        .filter(d => d.incidentId === selectedIncidentId)
        .raise();
}

// Called on initial load and on SET_MONTH. Uses local heatmap_by_month.json
// for the heatmap, and live SF Open Data rows for the clickable incident dots.
async function renderMonth(monthKey) {
    if (!heatmapDataCache) {
        heatmapDataCache = await fetch("heatmap_by_month.json").then(r => r.json());
    }

    const monthPoints = heatmapDataCache[monthKey];
    if (!monthPoints || monthPoints.length === 0) throw new Error("No heatmap data for this month.");
    selectedIncidentId = null;

    let rows;
    if (emsCache.has(monthKey)) {
        rows = emsCache.get(monthKey);
    } else {
        // Use real incident rows for the dot layer instead of generating dots
        // around the heatmap summary points. This prevents artificial clumps.
        rows = await fetchEMSRows(monthKey);
        rows = seededShuffle(rows, monthSeed(monthKey));
        emsCache.set(monthKey, rows);
    }

    // Project local heatmap summary lat/lng to screen pixels
    const points = monthPoints.map(d => {
        const [x, y] = projection([d.lng, d.lat]);
        return { x, y, t: d.t };
    });

    currentMonthKey = monthKey;
    currentMonthRows = rows;
    const { grid, cols, rows: gridRows } = buildGrid(points);
    const min = d3.min(points, d => d.t);
    const max = d3.max(points, d => d.t);

    const color = d3.scaleSequential()
        .domain([min, max])
        .interpolator(t => d3.interpolateRgbBasis(["#f3e8ff","#c084fc","#7e22ce","#4c1d95","#2e1065"])(t));

    const contours = d3.contours().size([cols, gridRows]).thresholds(20)(grid);
    const contourPath = d3.geoPath(d3.geoIdentity().scale(8));

    // Clear and redraw heatmap
    heatmapLayer.selectAll("*").remove();
    heatmapLayer.selectAll("path")
        .data(contours)
        .enter()
        .append("path")
        .attr("d", contourPath)
        .attr("fill", d => color(d.value))
        .attr("stroke", d => color(d.value))
        .attr("stroke-width", 1.3)
        .attr("opacity", 1);

    // Clear and redraw dots using the current slider value.
    renderDots();

}

// Runs once on page load, fetches static data in parallel (SF boundary GeoJSON,
// tract/zip boundary lines, fire stations), sets up the projection and SVG layer
// stack, then calls renderMonth() for the initial month
async function init() {
    try {
        const [tracts, stations, sfUnion] = await Promise.all([
            fetch(TRACTS_URL).then(r => {
                if (!r.ok) throw new Error("Boundary file failed to load");
                return r.json();
            }),
            fetch("firestations.json").then(r => {
                if (!r.ok) throw new Error("Fire stations file failed to load");
                return r.json();
            }),
            fetch(params.get("boundary") === "tract" ? "sf_tracts_border.json" : "zip_borders.json").then(r => {
                if (!r.ok) throw new Error("SF border file failed to load");
                return r.json();
            })
        ]);

        allStations = stations;

        projection.fitExtent([[20, 20], [W - 20, H - 20]], sfUnion);

        // Heatmap layer (must be below ocean mask)
        heatmapLayer = container.append("g");

        // Ocean mask
        const sfUnionPath = pathGen(sfUnion);
        container.append("path")
            .attr("fill", "#b8d4e8")
            .attr("fill-rule", "evenodd")
            .attr("d", `M -9999 -9999 H 99999 V 99999 H -9999 Z ${sfUnionPath}`);

        // Boundaries / clickable regions
        const isTract = params.get("boundary") === "tract";
        regionIdFn = (feature) => isTract ? feature.properties.GEOID : feature.properties.ZCTA5CE20;

        // Rewind rings so transparent fills stay inside each region and remain clickable.
        tracts.features.forEach(feature => {
            const polygons = feature.geometry.type === "MultiPolygon"
                ? feature.geometry.coordinates
                : [feature.geometry.coordinates];
            polygons.forEach(poly => poly.forEach(ring => ring.reverse()));
        });

        boundariesLayer = container.append("g");

        regionPaths = boundariesLayer.selectAll("path")
            .data(tracts.features)
            .enter()
            .append("path")
            .attr("d", pathGen)
            .attr("fill", "transparent")
            .attr("pointer-events", "all")
            .style("cursor", "pointer")
            .attr("stroke", "#14071f")
            .attr("stroke-width", 0.8)
            .on("click", function (event, d) {
                const id = regionIdFn(d);
                if (id == null) return;
                window.parent.postMessage({
                    type: "REGION_CLICK",
                    id: String(id),
                    boundary: isTract ? "tract" : "zipcode"
                }, "*");
            });

        applyRegionHighlight();

        // Dots layer
        dotsLayer = container.append("g").attr("id", "dots-layer");

        // Stations layer
        stationsLayer = container.append("g").attr("display", "none");
        stationsLayer.selectAll("circle")
            .data(stations)
            .enter()
            .append("circle")
            .attr("cx", d => projection([d.lng, d.lat])[0])
            .attr("cy", d => projection([d.lng, d.lat])[1])
            .attr("r", 5)
            .attr("fill", "#ff6b00")
            .attr("stroke", "#ffffff")
            .attr("stroke-width", 1.5)
            .on("mouseover", function (event, d) {
                d3.select("#tooltip")
                    .style("display", "block")
                    .style("left", (event.clientX + 14) + "px")
                    .style("top", (event.clientY - 10) + "px")
                    .html(`<strong>Station ${parseInt(d.station_number)}</strong>`);
            })
            .on("mousemove", function (event) {
                d3.select("#tooltip")
                    .style("left", (event.clientX + 14) + "px")
                    .style("top", (event.clientY - 10) + "px");
            })
            .on("mouseout", function () { d3.select("#tooltip").style("display", "none"); });

        await renderMonth(monthParam);

        window.parent.postMessage({ type: "MAP_READY" }, "*");

    } catch (error) {
        console.error(error);
        svg.append("text")
            .attr("x", W / 2).attr("y", H / 2)
            .attr("text-anchor", "middle")
            .attr("fill", "#233962")
            .attr("font-size", "20px")
            .attr("font-family", "Arial, sans-serif")
            .text("Map data could not load. Check Live Server and file names.");
    }
}

init();
</script>

</body>
</html>
